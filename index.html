<!DOCTYPE html>

<head>

<body>

<main class="box">

<span class="label">पक्ष</span>

<div class="item">
<span class="label">तिथि</span>
<span id="tithi"></span>
</div>

<div class="item">
<span class="label">नक्षत्र</span>
<span id="nakshatra"></span>
</div>

<div class="item">
<span class="label">योग</span>
<span id="yoga"></span>
</div>

<div class="item">
<span class="label">करण</span>
<span id="karana"></span>
</div>

</div>

</section>

<hr>

<section>

<h2>📜 आज का संकल्प</h2>

<div id="sankalpText" class="sankalpBox">

श्रीमदाद्य ब्रह्मणः द्वितीयपरार्धे...
