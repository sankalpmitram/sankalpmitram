<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>संकल्पमित्रम्</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    🕉️ संकल्पमित्रम्
</header>

<div class="box">

    <h2>📅 आज की तारीख</h2>

    <p id="todayDate"></p>

    <p><b>वार :</b> <span id="todayDay"></span></p>
    <p><b>विक्रम संवत् :</b> <span id="vikram"></span></p>
    <p><b>मास :</b> <span id="month"></span></p>
    <p><b>पक्ष :</b> <span id="paksha"></span></p>
    <p><b>तिथि :</b> <span id="tithi"></span></p>

    <p><b>नक्षत्र :</b> <span id="nakshatra"></span></p>
    <p><b>योग :</b> <span id="yoga"></span></p>
    <p><b>करण :</b> <span id="karana"></span></p>

    <h2>आज का संकल्प</h2>

    <p id="sankalpText">
        श्रीमदाद्य ब्रह्मणः द्वितीयपरार्धे...
    </p>

</div>

<script src="script.js"></script>

</body>
</html>
